# nginx vhost для StrelkaVPS landing (SPA на Vite).
# Подхватывается из /etc/nginx/conf.d/ — основной nginx.conf остаётся дефолтным.

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Безопасные дефолты. HSTS включает обратный прокси (traefik/caddy), не мы.
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # Сжатие: gzip (всегда) + brotli, если модуль собран.
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_comp_level    6;
    gzip_proxied       any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # Assets: хэшированные имена от Vite → immutable на год.
    # expires не используем, чтобы не плодить дублирующийся Cache-Control.
    location ^~ /assets/ {
        access_log  off;
        add_header  Cache-Control "public, max-age=31536000, immutable" always;
        try_files   $uri =404;
    }

    # Прочие статические файлы из public/ — умеренный кеш.
    location ~* \.(?:ico|svg|png|jpg|jpeg|webp|avif|woff2?|ttf|otf|eot)$ {
        access_log  off;
        add_header  Cache-Control "public, max-age=2592000" always;
        try_files   $uri =404;
    }

    # Healthcheck для Docker / балансеров.
    location = /healthz {
        access_log  off;
        default_type text/plain;
        return      200 "ok\n";
    }

    # SPA: любой путь, которого нет на диске, отдаёт index.html
    # (/signup, /terms, /privacy-policy, /cancel маршрутизируются во фронте).
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Не светим dotfiles.
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}
